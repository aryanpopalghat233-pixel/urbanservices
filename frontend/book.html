<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Service</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <h1><a href="/">UrbanService</a></h1>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/book">Book Service</a></li>
            <li><a href="/track">Track Worker</a></li>
        </ul>
    </nav>
    <div class="container">
        <h2>Book a Service</h2>
        <form id="bookingForm">
            <input type="text" id="customerName" placeholder="Your Full Name" required>
            <select id="serviceType" required>
                <option value="" disabled selected>Select a Service</option>
                <option value="Plumber">Plumber</option>
                <option value="Electrician">Electrician</option>
                <option value="Cleaning">Cleaning</option>
            </select>
            <input type="text" id="address" placeholder="Your Address" required>
            <button type="submit">Confirm Booking</button>
        </form>
        <p id="responseMessage" style="margin-top: 1rem; color: green; font-weight: bold;"></p>
    </div>
    <script src="js/main.js"></script>
</body>
</html>
